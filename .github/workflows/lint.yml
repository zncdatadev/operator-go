name: Lint
permissions:
  contents: read

on:
  push:
  pull_request:

jobs:
  go-lint:
    name: Go Lint
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      # Single source of truth: derive the golangci-lint version from the Makefile
      # (GOLANGCI_LINT_VERSION) so CI and `make lint` can never drift.
      - name: Resolve golangci-lint version from Makefile
        id: golangci
        run: |
          version="$(grep -oP 'GOLANGCI_LINT_VERSION\s*\?=\s*\K\S+' Makefile)"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Run linter
        uses: golangci/golangci-lint-action@v9
        with:
          version: ${{ steps.golangci.outputs.version }}

  md-lint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@v6

      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v24
        with:
          globs: |
            README.*.md
