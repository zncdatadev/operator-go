---
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: mutating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /mutate-trino-kubedoop-dev-v1alpha1-trinocluster
  failurePolicy: Fail
  name: mtrinocluster-v1alpha1.kb.io
  rules:
  - apiGroups:
    - trino.kubedoop.dev
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - trinoclusters
  sideEffects: None
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: validating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-trino-kubedoop-dev-v1alpha1-trinocluster
  failurePolicy: Fail
  name: vtrinocluster-v1alpha1.kb.io
  rules:
  - apiGroups:
    - trino.kubedoop.dev
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - trinoclusters
  sideEffects: None
